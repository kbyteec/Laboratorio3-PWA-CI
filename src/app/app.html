<div class = "container py-5">
    <div class = "row justify-content-center">
        <div class = "col-md-8 col-lg-6">

            <div class = "card shadow">
                <div class = "card-header bg-primary text-white text-center">
                    <h3 class = " mb-0">
                        {{ titulo }}
                    </h3>
                </div>
                <div class = "card-body">
                    <p text-muted text-center>
                        Aplicación PWA desarrollada con Angular y Bootstrap
                    </p>
                    <div class = "alert" [class.alert-success] = "estadoOnline" [class.alert-danger] = "!estadoOnline">
                        Estado de la conexión:
                        <strong>
                            {{ estadoOnline ? 'En línea' : 'Sin conexión' }}
                        </strong>
                    </div>
                    <div class = " input-group mb-3">
                        <input type = "text" class = "form-control" placeholder = "Ingrese una tarea"
                        [(ngModel)] = "nuevaTarea">

                        <button class = "btn btn-primary mt-2" (click) = "agregarTarea()">
                            Agregar
                        </button>
                    </div>
                    <ul class = "list-group">
                        @for( tarea of tareas; track tarea.texto; let i = $index){
                            <li class = "list-group-item d-flex justify-content-between align-items-center">
                                <span role = "button" [class.text-decoration-line-through] = "tarea.
                                completada" [class.text-muted] = "tarea.completada" (click) = "cambiarEstado
                                (tarea)">
                                    {{ tarea.texto }}
                                </span>
                                <button class = "btn btn-danger btn-sm" (click) = "eliminarTarea(i)">
                                    Eliminar
                                </button>
                            </li>

                        }
                    </ul>

                </div>
                <div class = "card-footer text-center">
                    <small class = "text-muted">
                        &copy; 2024 - Aplicación PWA
                    </small>

                </div>
            </div>
        </div>

    </div>
</div>
